version: '3.8'

services:
  # 1. MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: saiof-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - saiof-network
    restart: always

  # 2. Python FastAPI Forecasting Service
  ml-engine:
    build:
      context: ../
      dockerfile: docker/ml-engine.Dockerfile
    container_name: saiof-ml-engine
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MONGO_URI=mongodb://mongodb:27017/saiof
    depends_on:
      - mongodb
    networks:
      - saiof-network
    restart: always

  # 3. Express MERN Backend Service
  backend:
    build:
      context: ../
      dockerfile: docker/backend.Dockerfile
    container_name: saiof-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/saiof
      - JWT_SECRET=super_secret_saiof_token_key_development_only_9988
      - NODE_ENV=development
      - ML_ENGINE_URL=http://saiof-ml-engine:8000
    depends_on:
      - mongodb
      - ml-engine
    networks:
      - saiof-network
    restart: always

  # 4. Vite React Frontend Storefront & Dashboard
  frontend:
    build:
      context: ../
      dockerfile: docker/frontend.Dockerfile
    container_name: saiof-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - saiof-network
    restart: always

networks:
  saiof-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
